<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
<title>PermissionPilot — drop-in SwiftUI onboarding + permissions for macOS</title>
<desc>Dark teal hero banner: a macOS v0.1 badge, the PermissionPilot wordmark, a tagline, feature pills (Zero deps, Detect, Deep-link, Auto-recheck, Drag-to-authorize), and a glassy macOS app window showing a permissions checklist — Accessibility and Screen Recording granted; Input Monitoring and Full Disk Access still to enable; with Camera, Microphone and more available — and a glowing security-shield orb.</desc>
<defs>
 <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06151b"/><stop offset="1" stop-color="#0a1e23"/></linearGradient>
 <radialGradient id="glowT" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
 <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7c3aed" stop-opacity="0.20"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
 <radialGradient id="orb" cx="0.4" cy="0.35" r="0.75"><stop offset="0" stop-color="#5eead4"/><stop offset="0.6" stop-color="#0f766e"/><stop offset="1" stop-color="#06251f"/></radialGradient>
 <linearGradient id="win" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e2329"/><stop offset="1" stop-color="#0a1c21"/></linearGradient>
 <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0 H0 V34" fill="none" stroke="#2dd4bf" stroke-opacity="0.055" stroke-width="1"/></pattern>
</defs>

<rect x="0" y="0" width="680" height="340" rx="16" fill="url(#bg)"/>
<rect x="0" y="0" width="680" height="340" rx="16" fill="url(#grid)"/>
<ellipse cx="560" cy="60" rx="270" ry="210" fill="url(#glowT)"/>
<ellipse cx="660" cy="330" rx="230" ry="170" fill="url(#glowP)"/>

<!-- LEFT -->
<rect x="40" y="38" width="106" height="30" rx="15" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/>
<text x="93" y="58" font-size="12.5" font-weight="600" text-anchor="middle" fill="#2dd4bf">macOS · v0.1</text>

<text x="37" y="122" font-size="44" font-weight="800" fill="#eafaf7">Permission</text>
<text x="37" y="164" font-size="44" font-weight="800" fill="#2dd4bf">Pilot</text>

<text x="40" y="194" font-size="13" fill="#9fc4bf">Drop-in SwiftUI onboarding + permissions for macOS apps.</text>
<text x="40" y="213" font-size="13" fill="#9fc4bf">Declare what you need — get detection, deep-links, auto-</text>
<text x="40" y="232" font-size="13" fill="#9fc4bf">recheck, drag-to-authorize, and a polished wizard.</text>

<g font-size="12" fill="#eafaf7" text-anchor="middle">
 <rect x="40" y="250" width="80" height="27" rx="13.5" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/><text x="80" y="267">Zero deps</text>
 <rect x="128" y="250" width="62" height="27" rx="13.5" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/><text x="159" y="267">Detect</text>
 <rect x="198" y="250" width="86" height="27" rx="13.5" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/><text x="241" y="267">Deep-link</text>
 <rect x="40" y="285" width="106" height="27" rx="13.5" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/><text x="93" y="302">Auto-recheck</text>
 <rect x="154" y="285" width="138" height="27" rx="13.5" fill="rgba(45,212,191,.10)" stroke="rgba(45,212,191,.40)" stroke-width="1"/><text x="223" y="302">Drag-to-authorize</text>
</g>

<!-- RIGHT: app window -->
<ellipse cx="523" cy="170" rx="150" ry="150" fill="url(#glowT)" opacity="0.5"/>
<rect x="406" y="34" width="234" height="274" rx="16" fill="url(#win)" stroke="rgba(45,212,191,.30)" stroke-width="1"/>
<circle cx="424" cy="58" r="4" fill="#ff5f57"/><circle cx="438" cy="58" r="4" fill="#febc2e"/><circle cx="452" cy="58" r="4" fill="#28c840"/>
<text x="422" y="88" font-size="13" font-weight="700" fill="#eafaf7">PermissionPilot</text>
<text x="422" y="106" font-size="11" font-weight="600" fill="#2dd4bf">2 of 6 enabled</text>

<!-- shield orb -->
<circle cx="612" cy="76" r="22" fill="#2dd4bf" opacity="0.16"/>
<circle cx="612" cy="76" r="17" fill="url(#orb)" stroke="rgba(94,234,212,.6)" stroke-width="1"/>
<path d="M612 67 L620 70 L620 78 C620 83 616 86 612 88 C608 86 604 83 604 78 L604 70 Z" fill="#eafaf7"/>
<path d="M608.5 77 l2.5 2.5 l4.5 -5" stroke="#0e2329" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

<!-- inner checklist -->
<rect x="422" y="120" width="202" height="176" rx="12" fill="rgba(18,48,54,.6)" stroke="rgba(45,212,191,.18)" stroke-width="1"/>
<line x1="436" y1="160" x2="610" y2="160" stroke="rgba(255,255,255,.07)"/>
<line x1="436" y1="192" x2="610" y2="192" stroke="rgba(255,255,255,.07)"/>
<line x1="436" y1="224" x2="610" y2="224" stroke="rgba(255,255,255,.07)"/>
<line x1="436" y1="256" x2="610" y2="256" stroke="rgba(255,255,255,.07)"/>

<!-- row1 accessibility (granted) -->
<rect x="436" y="134" width="22" height="22" rx="6" fill="rgba(45,212,191,.12)"/>
<circle cx="447" cy="141" r="2.1" fill="#bfeee6"/><path d="M441 146 H453 M447 146 L443 152 M447 146 L451 152" stroke="#bfeee6" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="466" y="149" font-size="12" fill="#eafaf7">Accessibility</text>
<circle cx="566" cy="145" r="6" fill="#4ade80"/><path d="M563.2 145 l1.9 1.9 l3.7 -4.2" stroke="#06151b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="610" y="149" font-size="11" text-anchor="end" fill="#4ade80">Granted</text>

<!-- row2 screen recording (granted) -->
<rect x="436" y="166" width="22" height="22" rx="6" fill="rgba(45,212,191,.12)"/>
<rect x="440" y="172" width="14" height="10" rx="2" stroke="#bfeee6" stroke-width="1.4" fill="none"/><path d="M444 185 H450" stroke="#bfeee6" stroke-width="1.4" stroke-linecap="round"/>
<text x="466" y="181" font-size="12" fill="#eafaf7">Screen Recording</text>
<circle cx="566" cy="177" r="6" fill="#4ade80"/><path d="M563.2 177 l1.9 1.9 l3.7 -4.2" stroke="#06151b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="610" y="181" font-size="11" text-anchor="end" fill="#4ade80">Granted</text>

<!-- row3 input monitoring (enable) -->
<rect x="436" y="198" width="22" height="22" rx="6" fill="rgba(45,212,191,.12)"/>
<rect x="439" y="205" width="16" height="9" rx="2" stroke="#bfeee6" stroke-width="1.3" fill="none"/><circle cx="443" cy="209.5" r="0.9" fill="#bfeee6"/><circle cx="447" cy="209.5" r="0.9" fill="#bfeee6"/><circle cx="451" cy="209.5" r="0.9" fill="#bfeee6"/>
<text x="466" y="213" font-size="12" fill="#eafaf7">Input Monitoring</text>
<rect x="566" y="202" width="46" height="21" rx="10.5" fill="#2dd4bf"/><text x="589" y="216.5" font-size="11" font-weight="700" text-anchor="middle" fill="#06151b">Enable</text>

<!-- row4 full disk access (enable) -->
<rect x="436" y="230" width="22" height="22" rx="6" fill="rgba(45,212,191,.12)"/>
<rect x="439" y="237" width="16" height="9" rx="2" stroke="#bfeee6" stroke-width="1.3" fill="none"/><circle cx="443" cy="241.5" r="1.1" fill="#bfeee6"/><path d="M447 241.5 H453" stroke="#bfeee6" stroke-width="1.3" stroke-linecap="round"/>
<text x="466" y="245" font-size="12" fill="#eafaf7">Full Disk Access</text>
<rect x="566" y="234" width="46" height="21" rx="10.5" fill="#2dd4bf"/><text x="589" y="248.5" font-size="11" font-weight="700" text-anchor="middle" fill="#06151b">Enable</text>

<!-- extensible footer -->
<text x="523" y="280" font-size="10.5" text-anchor="middle" fill="#79a39c">+ Camera · Microphone · and more</text>
</svg>
