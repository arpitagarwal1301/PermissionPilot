<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
<title>PermissionPilot — drop-in SwiftUI onboarding + permissions for macOS</title>
<desc>App-themed hero: dark surfaces, system-blue accent, green granted checks. The PermissionPilot wordmark and tagline on the left; on the right a macOS window titled Permissions with a 3 by 3 grid of permission tiles — Accessibility, Screen Recording, Input Monitoring, Full Disk, Camera, Microphone, Bluetooth, Location, Notifications — five marked granted, conveying an extensible set plus your own.</desc>
<defs>
 <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1b1b1d"/><stop offset="1" stop-color="#161617"/></linearGradient>
 <radialGradient id="gB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#0a84ff" stop-opacity="0.18"/><stop offset="1" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
 <radialGradient id="orbB" cx="0.4" cy="0.35" r="0.75"><stop offset="0" stop-color="#7fbcff"/><stop offset="0.6" stop-color="#0a55b0"/><stop offset="1" stop-color="#08233f"/></radialGradient>
 <linearGradient id="winA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#242426"/><stop offset="1" stop-color="#1c1c1e"/></linearGradient>
</defs>
<rect x="0" y="0" width="680" height="380" rx="16" fill="url(#bgA)"/>
<ellipse cx="520" cy="40" rx="280" ry="190" fill="url(#gB)"/>

