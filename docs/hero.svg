<text x="35" y="156" font-size="38" font-weight="800" fill="#0a84ff">Pilot</text>
<text x="38" y="186" font-size="13" fill="#aeaeb2">Drop-in onboarding + permissions</text>
<text x="38" y="205" font-size="13" fill="#aeaeb2">for macOS apps. Zero dependencies.</text>

<g font-size="11.5" text-anchor="middle">
